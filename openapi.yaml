        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                login_success:
                  summary: 登录成功
                  value:
                    success: true
                    message: 'Login successful'
                    token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
                    username: 'player123'
                    isAdmin: false
                account_selection:
                  summary: 需要选择账户
                  value:
                    success: true
                    message: 'Multiple accounts found, please select one'
                    requireAccountSelection: true
                    tempToken: 'temp_abc123'
                    accounts:
                      - username: 'player123'
                        email: 'user@example.com'
                        status: 'approved'
                      - username: 'player456'
                        email: 'user@example.com'
                        status: 'approved'
        '400':
