                  verifyMethod: 'password'
                  language: 'zh'
              email_code_login:
                summary: 邮箱验证码登录
                value:
                  account: 'user@example.com'
                  code: '123456'
                  loginMethod: 'email'
                  verifyMethod: 'code'
                  language: 'zh'
              phone_login:
                summary: 手机号登录
                value:
                  account: '13800138000'
                  password: 'SecurePass123'
                  loginMethod: 'phone'
                  verifyMethod: 'password'
                  countryCode: '+86'
                  language: 'zh'
