# ----------------------------------------
# 全局设置
# ----------------------------------------
# 全局语言设置，影响插件消息和网页界面。（例如 'zh', 'en'）
language: en
# 开启后，控制台会输出详细的日志，用于故障排查。
debug: false
# 统一控制 /vmc 管理命令和 Web 管理后台的鉴权方式。
# op：按服务器 OP 身份判断。
# permission：命令按 Bukkit 权限判断，Web/离线用户按 Vault 权限服务判断。
admin_auth:
  mode: op

# ----------------------------------------
# 网页服务器与前端
# ----------------------------------------
# 网页服务使用的端口。
web_port: 8080
# WebSocket 服务使用的端口。
ws_port: 8081
# 显示在网页界面上的服务器名称。
web_server_prefix: '[ Name ]'
# 是否启用内置 HTTPS 和 WSS 服务。
ssl:
  enabled: false
  keystore:
    # 密钥库文件路径。相对路径将基于插件数据目录解析。
    path: ""
    # 密钥库和私钥的密码。
    password: ""
    # 密钥库类型，例如：PKCS12 或 JKS。
    type: PKCS12

frontend:
  # 是否由插件自身托管静态前端文件。
  # 如果你把 frontend/glassx/dist 部署到其他域名，请设为 false。
  serve_static: true
  # 网页界面的视觉主题。可选: 'glassx'。
  theme: glassx
  # Logo 的 URL。可以是网页链接或本地文件路径（例如 '/logo.png'）。
  logo_url: /logo.png
  # 显示在主页上的公告信息。
  announcement: 欢迎来到[ Name ]!

  # 允许跨域访问 API 的前端来源列表。
  # 支持完全匹配，例如: https://your-pages-domain.pages.dev
  # 也支持子域名通配，例如: https://*.example.com
  # 所有匹配都会忽略端口；通配仅匹配单层子域名。
  # 当前端独立部署时，还需要在前端构建时设置 VITE_BOOTSTRAP_API_BASE，
  # 指向本插件的 HTTP 基址（不要带 /api）。
  # 留空列表表示允许所有跨域来源。
  allowed_origins: []

# ----------------------------------------
# 验证与白名单
# ----------------------------------------
# 支持的验证方式。可选: 'email'（邮箱验证码）, 'captcha'（图形验证码）, 'sms'（短信验证）。
# 
# 配置指南：
#   must_auth_methods: 必须完成的验证方式 - 用户必须通过所有列出的方式才能注册
#   option_auth_methods: 可选的验证方式 - 用户可以选择其中一种或多种
#   min_option_auth_methods: 用户至少需要完成的可选验证方式数量
# 
# 示例：
#   仅邮箱验证: must_auth_methods: [email]
#   邮箱 + 图形验证码: must_auth_methods: [email, captcha]
#   邮箱必须，短信或图形验证码可选：
#     must_auth_methods: [email]
#     option_auth_methods: [sms, captcha]
#     min_option_auth_methods: 1
# 
# 【重要】仅配置下方的 captcha/sms 部分不会启用验证！
# 必须将验证方式添加到 must_auth_methods 或 option_auth_methods 中才能启用。
auth:
  # 必须完成的验证方式列表。用户必须通过所有列出的方式才能注册。
  must_auth_methods: []
  # 可选的验证方式列表。用户可以选择其中一种或多种进行验证。
  option_auth_methods: []
  # 用户至少需要完成的可选验证方式数量。
  min_option_auth_methods: 0

# ----------------------------------------
# 短信验证配置
# ----------------------------------------
# 在 must_auth_methods 或 option_auth_methods 中添加 'sms' 来启用
sms:
  # 是否启用短信验证功能
  enabled: false
  # 短信服务提供商: tencent（腾讯云）或 aliyun（阿里云）
  provider: tencent
  # 地域（腾讯云使用，例如: ap-guangzhou）
  region: ap-guangzhou
  # 短信签名名称
  sign_name: ""
  # 短信模板ID
  template_id: ""
  # SDK应用ID（腾讯云使用）
  sdk_app_id: ""
  # 支持的国家/地区代码列表
  country_codes:
    - "+86"
  # 手机号码验证正则表达式
  phone_regex: "^[0-9]{6,15}$"
  # 单个手机号最多可以绑定的游戏账号数量
  max_accounts_per_phone: 5
  
  # 腾讯云短信配置
  tencent:
    # 腾讯云 SecretId
    secret_id: ""
    # 腾讯云 SecretKey
    secret_key: ""
  
  # 阿里云短信配置
  aliyun:
    # 阿里云 AccessKeyId
    access_key_id: ""
    # 阿里云 AccessKeySecret
    access_key_secret: ""

# 白名单模式: 'bukkit'（与服务器的 whitelist.json 同步）或 'plugin'（使用插件内部数据库）。
whitelist_mode: plugin
# 在 'plugin' 模式下，向未在白名单中的玩家显示的注册URL。
web_register_url: https://domain.com/

# ----------------------------------------
# 注册
# ----------------------------------------
# 如果为 true，新用户注册将自动通过。如果为 false，则需要管理员手动审核。
register:
  auto_approve: false

# ----------------------------------------
# 用户与安全
# ----------------------------------------
# 用于验证玩家名的统一正则表达式。
# Java 版用户名直接匹配；基岩版会先去掉 bedrock.prefix，再用原始用户名本体匹配。
username_regex: "^[a-zA-Z0-9_-]{3,16}$"
# 如果为 false，则仅大小写不同的用户名（例如 "Player" 和 "player"）将被视为相同。
username_case_sensitive: false

# 用户配置
user:
  # 允许的密码重置方式列表
  # 可选值: current_password（当前密码）, email（邮箱验证）, sms（短信验证）
  password_reset_methods: ["current_password"]

# 忘记密码功能配置
forgot_password:
  # 是否启用忘记密码功能
  enabled: true
  # 是否在忘记密码流程中启用验证码
  captcha_enabled: false

# ----------------------------------------
# 邮箱配置
# ----------------------------------------
email:
  # SMTP 服务器配置
  smtp:
    # SMTP 服务器地址
    host: smtp.qq.com
    # SMTP 服务器端口
    port: 587
    # SMTP 登录用户名（通常是邮箱地址）
    username: your_email@qq.com
    # SMTP 登录密码或授权码
    password: your_email_password
    # 发件人邮箱地址（通常与 username 相同）
    from: your_email@qq.com
    # 是否启用 SSL/TLS 加密
    enable_ssl: true
  # 验证码邮件的主题（标题）
  subject: VerifyMC Verification Code
  # 单个邮箱最多可以绑定的游戏账号数量
  max_accounts_per_email: 2
  # 是否启用邮箱域名白名单
  domain_whitelist_enabled: true
  # 是否限制邮箱别名（如禁止 user+xxx@gmail.com）
  alias_limit_enabled: false
  # 邮箱域名白名单，留空则使用默认主流邮箱域
  domain_whitelist:
    - gmail.com
    - 163.com
    - 126.com
    - qq.com
    - outlook.com
    - hotmail.com
    - icloud.com
    - yahoo.com
    - foxmail.com
  # 用户通知配置（审核结果邮件通知）
  notification:
    # 是否启用用户通知功能
    enabled: true
    # 审核通过时是否发送通知邮件
    on_approve: true
    # 审核拒绝时是否发送通知邮件
    on_reject: true

# ----------------------------------------
# 自动更新资源
# ----------------------------------------
# 如果为 true，插件启动时会自动更新语言文件、邮件模板和主题文件。
auto_update_resources: true

# ----------------------------------------
# 存储
# ----------------------------------------
# 存储类型，可选: file（本地文件）, mysql（外部数据库）
storage: file
mysql:
  host: localhost
  port: 3306
  database: verifymc
  user: root
  password: yourpassword 
  # 是否启用与主数据库连接时的 SSL
  useSSL: true
  # 是否允许获取 MySQL 公钥（部分 MySQL 8 环境可能需要开启）
  allowPublicKeyRetrieval: false

# ----------------------------------------
# Authme 集成配置
# ----------------------------------------
authme:
  # 是否启用 Authme 集成功能
  enabled: true
  # 密码正则表达式
  password_regex: "^[a-zA-Z0-9_]{8,26}$"
  database:
    # database 模式下数据库类型: mysql / sqlite
    type: sqlite
    # AuthMe 表名
    table: authme
    # 密码格式仅支持 SHA-256，盐长度固定为 16。如原先不是，请在 AuthMe 中切换（AuthMe 支持惰性回退）。
    # 在 AuthMe 中切换后，请先直接进服登录一次以触发惰性回退到 SHA-256，或者也可以直接在后台重置密码。
    # VerifyMC 与 AuthMe 双向同步间隔（秒）
    sync_interval_seconds: 30
    mysql:
      host: 127.0.0.1
      port: 3306
      database: authme
      user: root
      password: yourpassword
      # 是否启用与 AuthMe MySQL 数据库连接时的 SSL
      useSSL: true
      # 是否允许获取 MySQL 公钥（部分 MySQL 8 环境可能需要开启）
      allowPublicKeyRetrieval: false
    sqlite:
      path: plugins/AuthMe/authme.db
    columns:
      mySQLColumnId: id
      # 用于存储或查询玩家昵称的列
      mySQLColumnName: username
      # 用于存储或查询玩家真实名称（RealName）的列
      mySQLRealName: realname
      # 用于存储玩家密码的列
      mySQLColumnPassword: password
      # 用于存储玩家密码盐值的列
      mySQLColumnSalt: ''
      # 用于存储玩家邮箱的列
      mySQLColumnEmail: email
      # 用于存储玩家是否已登录状态的列
      mySQLColumnLogged: isLogged
      # 用于存储玩家是否拥有有效会话状态的列
      mySQLColumnHasSession: hasSession
      # 用于存储玩家最后登录 IP 的列
      mySQLColumnIp: ip
      # 用于存储玩家最后登录时间的列
      mySQLColumnLastLogin: lastlogin
      # 用于存储注册日期的列
      mySQLColumnRegisterDate: regdate
      # 用于存储注册时 IP 地址的列
      mySQLColumnRegisterIp: regip
      # 用于存储玩家最后位置 X 坐标的列
      mySQLlastlocX: x
      # 用于存储玩家最后位置 Y 坐标的列
      mySQLlastlocY: y
      # 用于存储玩家最后位置 Z 坐标的列
      mySQLlastlocZ: z
      # 用于存储玩家最后位置所在世界名称的列
      mySQLlastlocWorld: world
      # 用于存储玩家最后位置朝向 Yaw 的列
      mySQLlastlocYaw: yaw
      # 用于存储玩家最后位置俯仰 Pitch 的列
      mySQLlastlocPitch: pitch
      # 用于存储玩家 UUID（可选）的列
      mySQLPlayerUUID: ''

# ----------------------------------------
# 图形验证码配置
# ----------------------------------------
# 图形验证码可作为邮箱验证的替代或补充方案
# 在 must_auth_methods 或 option_auth_methods 中添加 'captcha' 来启用
captcha:
  # 验证码类型: math（数学表达式）或 text（随机字符）
  type: math
  # 文本验证码长度（math 类型时忽略此项）
  length: 4
  # 验证码过期时间（秒）
  expire_seconds: 300

# ----------------------------------------
# 基岩版玩家支持
# ----------------------------------------
# 适用于 Geyser/Floodgate 的基岩版玩家
bedrock:
  # 是否启用基岩版玩家支持
  enabled: false
  # 基岩版玩家用户名前缀（Floodgate 常用 "."）
  prefix: "."

# ----------------------------------------
# 问卷调查配置
# ----------------------------------------
# 详细问题配置请参见 questionnaire.yml
questionnaire:
  # 是否启用问卷功能
  enabled: false
  # 通过所需的最低分数
  pass_score: 60
  rate_limit:
    # 限流时间窗口（毫秒）
    window_ms: 300000
    ip:
      # 每个 IP 在时间窗口内允许的最大提交次数
      max: 20
    uuid:
      # 每个 Minecraft UUID 在时间窗口内允许的最大提交次数
      max: 8
    email:
      # 每个邮箱在时间窗口内允许的最大提交次数
      max: 6

# ----------------------------------------
# LLM 问答评分（用于 text 问题）
# ----------------------------------------
llm:
  # 是否启用 LLM 自动评分。关闭后 text 题将全部转人工审核
  enabled: true
  # 评分提供方。可选：deepseek / google
  provider: deepseek
  # OpenAI 兼容接口基础地址，必须使用 https（程序会自动拼接 /chat/completions；ensureHttpsApiBase() 会拒绝 http://，包括内网本地代理地址）
  api_base: https://api.deepseek.com/v1
  # API 密钥
  api_key: ""
  # 模型名称
  model: deepseek-chat
  # 请求超时时间（毫秒）
  timeout: 10000
  # 解析失败或网络失败时的重试次数
  retry: 1
  # LLM 并发请求上限（用于保护接口和服务器负载）
  max_concurrency: 4
  # 获取并发配额的最长等待时间（毫秒）
  acquire_timeout: 1500
  # 重试退避基础时长（毫秒）
  retry_backoff_base: 300
  # 重试退避最大时长（毫秒）
  retry_backoff_max: 5000
  # 发送给模型的输入最大长度（字符）
  input_max_length: 2000
  circuit_breaker:
    # 熔断触发阈值（连续失败次数）
    failure_threshold: 5
    # 熔断开启时长（毫秒）
    open_ms: 30000
  # 固定系统提示词（和题目、回答、评分规则一起拼装）
  system_prompt: |
    你是一个公平的 Minecraft 白名单问卷评分助手。
    你必须严格根据题目、用户回答和评分规则进行打分。
    返回 JSON，且仅返回 JSON。
  # 评分规则文本，会拼接到用户提示词（可在 questionnaire.yml 的 text 题上用 scoring_rule 覆盖）
  scoring_rule: |
    主要考察：
    1) 与题意相关性
    2) 回答完整度与细节
    3) 对服务器规则与社区氛围的理解
  # 期望模型输出格式（JSON）
  score_format: '{"score": number, "reason": string, "confidence": number}'

# ----------------------------------------
# Discord 集成（OAuth2）
# ----------------------------------------
# 需要在 https://discord.com/developers/applications 创建 Discord 应用
discord:
  # 是否启用 Discord 集成
  enabled: false
  # Discord 应用的客户端ID
  client_id: ""
  # Discord 应用的客户端密钥
  client_secret: ""
  # OAuth2 回调地址
  redirect_uri: "https://yourdomain.com/api/discord/callback"
  # 可选：要求用户加入特定服务器的ID
  guild_id: ""
  # 是否强制要求绑定 Discord 才能注册
  required: false

# ----------------------------------------
# 下载资源配置
# ----------------------------------------
# 配置服务器客户端资源下载项，显示在网页界面的下载页面
downloads:
  client-modpack:
    # 下载项名称
    name: "Client Modpack"
    # 下载项描述
    description: "Required modpack for the server. Includes all necessary mods and configurations."
    # 版本号
    version: "1.0.0"
    # 文件大小（显示用）
    size: "256 MB"
    # 下载链接
    url: "#"
    # 图标名称（可选：gamepad, package, download, file, folder 等）
    icon: "gamepad"
  server-resource-pack:
    # 下载项名称
    name: "Server Resource Pack"
    # 下载项描述
    description: "Custom textures and assets for the server."
    # 版本号
    version: "2.1.0"
    # 文件大小（显示用）
    size: "64 MB"
    # 下载链接
    url: "#"
    # 图标名称
    icon: "package"
