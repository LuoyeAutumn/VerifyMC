language: en
debug: false
admin_auth:
  mode: op
web_port: 8080
ws_port: 8081
web_server_prefix: '[ Name ]'
ssl:
  enabled: false
  keystore:
    path: ""
    password: ""
    type: PKCS12
frontend:
  serve_static: true
  theme: glassx
  logo_url: /logo.png
  announcement: Welcome to [ Name ]!
  allowed_origins: []
whitelist_mode: plugin
web_register_url: https://domain.com/
register:
  auto_approve: false
  auth:
    must_auth_methods: []
    option_auth_methods: []
    min_option_auth_methods: 0
login:
  allowed_methods: ["username", "email_password", "email_code", "phone_password", "phone_code"]
  code_expire_seconds: 300
  code_length: 6
username_regex: "^[a-zA-Z0-9_-]{3,16}$"
username_case_sensitive: false
password_regex: "^[a-zA-Z0-9_]{8,26}$"
user:
  password_reset_methods: ["current_password"]
forgot_password:
  enabled: true
  captcha_enabled: false
email:
  smtp:
    host: smtp.qq.com
    port: 587
    username: your_email@qq.com
    password: your_email_password
    from: your_email@qq.com
    enable_ssl: true
  subject: VerifyMC Verification Code
  max_accounts_per_email: 2
  domain_whitelist_enabled: true
  alias_limit_enabled: false
  domain_whitelist:
    - gmail.com
    - 163.com
    - 126.com
    - qq.com
    - outlook.com
    - hotmail.com
    - icloud.com
    - yahoo.com
    - foxmail.com
  notification:
    enabled: true
    on_approve: true
    on_reject: true
sms:
  enabled: false
  provider: tencent
  region: ap-guangzhou
  sign_name: ""
  template_id: ""
  sdk_app_id: ""
  country_codes:
    - "+86"
  phone_regex: "^[0-9]{6,15}$"
  max_accounts_per_phone: 5
  code:
    expire_minutes: 5
    max_attempts: 5
  connect_timeout: 5
  request_timeout: 10
  tencent:
    secret_id: ""
    secret_key: ""
  aliyun:
    access_key_id: ""
    access_key_secret: ""
storage: file
mysql:
    host: localhost
    port: 3306
    database: verifymc
    user: root
    password: yourpassword
    useSSL: true
    allowPublicKeyRetrieval: false
authme:
  enabled: true
  database:
    type: sqlite
    table: authme
    sync_interval_seconds: 30
    mysql:
      host: 127.0.0.1
      port: 3306
      database: authme
      user: root
      password: yourpassword
      useSSL: true
      allowPublicKeyRetrieval: false
    sqlite:
      path: plugins/AuthMe/authme.db
    columns:
      mySQLColumnId: id
      mySQLColumnName: username
      mySQLRealName: realname
      mySQLColumnPassword: password
      mySQLColumnSalt: ''
      mySQLColumnEmail: email
      mySQLColumnLogged: isLogged
      mySQLColumnHasSession: hasSession
      mySQLColumnIp: ip
      mySQLColumnLastLogin: lastlogin
      mySQLColumnRegisterDate: regdate
      mySQLColumnRegisterIp: regip
      mySQLlastlocX: x
      mySQLlastlocY: y
      mySQLlastlocZ: z
      mySQLlastlocWorld: world
      mySQLlastlocYaw: yaw
      mySQLlastlocPitch: pitch
      mySQLPlayerUUID: ''
captcha:
  type: math
  length: 4
  expire_seconds: 300
bedrock:
  enabled: false
  prefix: "."
questionnaire:
  enabled: false
  pass_score: 60
  rate_limit:
    window_ms: 300000
    ip:
      max: 20
    uuid:
      max: 8
    email:
      max: 6
llm:
  enabled: false
  provider: deepseek
  api_base: https://api.deepseek.com/v1
  api_key: ""
  model: deepseek-chat
  timeout: 10000
  retry: 1
  max_concurrency: 4
  acquire_timeout: 1500
  retry_backoff_base: 300
  retry_backoff_max: 5000
  input_max_length: 2000
  circuit_breaker:
    failure_threshold: 5
    open_ms: 30000
  system_prompt: |
    You are a fair Minecraft whitelist questionnaire grader.
    Score strictly based on the question, candidate answer, and scoring rule.
    Return JSON only.
  scoring_rule: |
    Evaluate primarily:
    1) Relevance to the question
    2) Completeness and level of detail
    3) Understanding of server rules and community norms
  score_format: '{"score": number, "reason": string, "confidence": number}'
discord:
  enabled: false
  client_id: ""
  client_secret: ""
  redirect_uri: "https://yourdomain.com/api/discord/callback"
  guild_id: ""
  required: false

downloads:
  client-modpack:
    name: "Client Modpack"
    description: "Required modpack for the server. Includes all necessary mods and configurations."
    version: "1.0.0"
    size: "256 MB"
    url: "#"
    icon: "gamepad"
  server-resource-pack:
    name: "Server Resource Pack"
    description: "Custom textures and assets for the server."
    version: "2.1.0"
    size: "64 MB"
    url: "#"
    icon: "package"
auto_update_resources: true
